@startuml
actor Client
participant "API Gateway" as API
participant "Order Service" as OS
database "Order DB" as DB

Client -> API: POST /store/order
API -> OS: createOrder(payload)
OS -> DB: insert(order)
DB - -> OS: orderId
OS - -> API: 201 Created
API - -> Client: 201 + order JSON
@enduml

