openapi: 3.0.3
info:
  title: Swagger Petstore API (Portfolio Subset)
  description: Компактный поднабор публичного Swagger Petstore API для портфолио техписа.
  version: 1.0.0
servers:
  - url: https://petstore.swagger.io/v2
    description: Публичный демо-сервер Swagger Petstore
paths:
  /pet/findByStatus:
    get:
      summary: Получить питомцев по статусу
      parameters:
        - in: query
          name: status
          required: true
          schema:
            type: string
            enum: [available, pending, sold]
          description: Статус питомцев для фильтрации.
      responses:
        '200':
          description: Список питомцев
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
  /pet/{petId}:
    get:
      summary: Получить питомца по ID
      parameters:
        - in: path
          name: petId
          required: true
          schema:
            type: integer
            format: int64
          description: Идентификатор питомца.
      responses:
        '200':
          description: Питомец найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Питомец не найден
  /store/inventory:
    get:
      summary: Получить инвентарь магазина
      responses:
        '200':
          description: Количество питомцев по статусам
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
                  format: int32
components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string
          enum: [available, pending, sold]
