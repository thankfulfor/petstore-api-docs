name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: docs-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install PlantUML dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml
      - name: Validate OpenAPI spec
        run: python -m openapi_spec_validator docs/openapi/openapi.yaml
      - name: Render diagrams
        run: bash scripts/render-diagrams.sh
      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Sync gh-pages branch
        run: |
          git fetch origin gh-pages || true
      - name: Deploy versioned docs with mike
        run: |
          mike deploy --update-aliases dev latest
          mike set-default latest
          git push origin gh-pages
